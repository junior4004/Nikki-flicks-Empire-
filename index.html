<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIKKI FLICKS EMPIRE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&display=swap');
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; }
        .gold { color: #D4AF37; font-family: 'Cinzel', serif; }
        .netflix-row { display: flex; overflow-x: auto; gap: 15px; padding: 20px; scrollbar-width: none; }
        .poster { min-width: 140px; height: 200px; background: #222; border: 1px solid #D4AF37; border-radius: 8px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 12px; color: #D4AF37; text-align: center; padding: 10px; }
    </style>
</head>
<body>
    <div id="gate" class="fixed inset-0 bg-black z-[9999] flex flex-col items-center justify-center p-6 text-center border-4 border-[#D4AF37]">
        <h1 class="gold text-4xl mb-4">NIKKI FLICKS</h1>
        <div class="p-6 bg-[#0a0a0a] max-w-md border border-gray-800">
            <h2 class="gold text-lg mb-2 uppercase">Welcome from Nicole T.</h2>
            <div class="bg-red-950/20 p-4 border border-red-900 mb-6 text-left">
                <p class="text-[11px] leading-relaxed text-gray-300 font-bold uppercase">
                    SPEAK AT YOUR WILL, BUT WATCH YOUR TONGUE.<br><br>
                    THIS IS OUR HOUSE. DISRESPECT IS NOT TOLERATED.<br><br>
                    IF YOU ARE UNDER 18, EXIT NOW.
                </p>
            </div>
            <button onclick="document.getElementById('gate').style.display='none'" class="w-full bg-[#D4AF37] text-black font-black py-4 rounded uppercase">Enter Empire</button>
        </div>
    </div>

    <header class="p-4 border-b border-[#D4AF37] flex justify-between items-center bg-[#050505]">
        <span class="gold text-xl">NIKKI FLICKS</span>
        <div class="text-[#D4AF37] font-bold border border-[#D4AF37] px-4 py-1 rounded-full text-sm">💰 10,000</div>
    </header>

    <div class="py-4">
        <h2 class="px-5 gold text-sm uppercase tracking-widest mb-2">Empire Theater</h2>
        <div class="netflix-row">
            <div class="poster">MOVIE 1<br>LOADING...</div>
            <div class="poster">MOVIE 2<br>LOADING...</div>
            <div class="poster">MOVIE 3<br>LOADING...</div>
            <div class="poster">MOVIE 4<br>LOADING...</div>
        </div>
    </div>

    <div class="p-5">
        <div class="grid grid-cols-2 gap-4">
            <div class="bg-[#111] border-2 border-[#D4AF37] p-8 text-center rounded-lg font-bold">♠️ SPADES</div>
            <div class="bg-[#111] border-2 border-[#D4AF37] p-8 text-center rounded-lg font-bold">♥️ POKER</div>
        </div>
    </div>
</body>
</html>
