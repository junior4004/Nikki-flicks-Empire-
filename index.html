<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIKKI FLICKS EMPIRE | 2026 EDITION</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@400;900&display=swap');
        :root { --gold: #D4AF37; }
        body { background: radial-gradient(circle at top, #1a1a1a 0%, #000 100%); color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .gold { color: var(--gold); font-family: 'Cinzel', serif; text-shadow: 0 0 15px rgba(212, 175, 55, 0.5); }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(25px); border: 1px solid rgba(212, 175, 55, 0.2); border-radius: 16px; }
        .scroll-row::-webkit-scrollbar { display: none; }
        .scroll-row { display: flex; overflow-x: auto; gap: 20px; padding: 20px; scrollbar-width: none; scroll-behavior: smooth; }
        .poster { min-width: 220px; height: 330px; transition: all 0.5s ease; cursor: pointer; position: relative; border-radius: 12px; overflow: hidden; background: #111; border: 1px solid rgba(212, 175, 55, 0.1); }
        .poster img { width: 100%; height: 100%; object-fit: cover; }
        .poster:hover { transform: scale(1.1) translateY(-10px); z-index: 10; border: 2px solid var(--gold); box-shadow: 0 0 30px var(--gold); }
        .mic-active { color: #ff3b3b; animation: pulse 1s infinite; display: block !important; }
        @keyframes pulse { 50% { opacity: 0.4; } }
    </style>
</head>
<body class="min-h-screen">

    <div id="gate" class="fixed inset-0 bg-black z-[100] flex flex-col items-center justify-center p-6 text-center transition-opacity duration-1000">
        <div class="glass p-10 max-w-lg">
            <h1 class="gold text-6xl mb-2 uppercase">Nikki Flicks</h1>
            <p class="text-gray-400 uppercase tracking-widest text-[10px] mb-8">2026 Imperial Access</p>
            <button onclick="enterEmpire()" class="w-full bg-[#D4AF37] text-black font-black py-5 rounded-full hover:scale-105 transition-all">ENTER THE EMPIRE</button>
        </div>
    </div>

    <header class="p-6 flex flex-col md:flex-row justify-between items-center sticky top-0 z-50 glass rounded-none border-x-0 border-t-0 gap-4">
        <span class="gold text-2xl font-black">NIKKI FLICKS</span>
        <div class="glass flex items-center px-4 py-1 w-full max-w-md">
            <input type="text" id="search" placeholder="Search the Vault..." onkeyup="handleSearch(event)" class="bg-transparent border-none outline-none text-xs w-full py-2 text-white">
        </div>
        <div class="flex items-center gap-6">
            <button onclick="toggleRadio()" id="r-btn" class="glass px-4 py-1 rounded text-[10px] font-bold">RADIO: OFF</button>
            <div class="gold font-black">💰 <span id="balance">10,000</span></div>
        </div>
    </header>

    <div class="px-8 mt-6">
        <div id="vip-banner" class="glass border-gold/40 p-4 flex justify-between items-center mb-6">
            <div><span class="gold text-[10px] font-black uppercase">Status: <span id="status">CITIZEN</span></span></div>
            <button id="up-btn" onclick="upgradeToVIP()" class="bg-[#D4AF37] text-black text-[10px] font-black px-4 py-1 rounded-full">UPGRADE TO VIP (5K)</button>
        </div>
        <div id="genre-list" class="flex gap-4 overflow-x-auto no-scrollbar pb-2"></div>
    </div>

    <div class="px-8">
        <div id="player-container" class="aspect-video glass hidden mb-10 overflow-hidden shadow-2xl">
            <video id="main-player" class="video-js vjs-big-play-centered" controls></video>
        </div>
    </div>

    <div class="py-4">
        <h2 id="row-title" class="px-8 gold text-xs font-black uppercase tracking-widest mb-2">Imperial Trending</h2>
        <div id="movie-row" class="scroll-row"></div>
    </div>

    <div class="px-8 py-10 grid grid-cols-1 lg:grid-cols-3 gap-6 mb-20">
        <div class="lg:col-span-1 space-y-4">
            <div class="glass p-6 text-center cursor-pointer hover:border-gold" onclick="sitAtTable('SPADES')">
                <span id="s-mic" class="hidden text-[10px] text-red-500 mb-2 font-bold">🎤 LIVE MIC</span>
                <div class="text-4xl mb-2">♠️</div>
                <div class="font-black text-xs uppercase">Spades Elite</div>
            </div>
            <div class="glass p-6 text-center cursor-pointer hover:border-gold" onclick="sitAtTable('POKER')">
                <span id="p-mic" class="hidden text-[10px] text-red-500 mb-2 font-bold">🎤 LIVE MIC</span>
                <div class="text-4xl mb-2">♥️</div>
                <div class="font-black text-xs uppercase">No Limit Poker</div>
            </div>
        </div>
        
        <div id="chat-win" class="glass h-[350px] flex flex-col">
            <div class="p-3 border-b border-white/10 gold text-[10px] font-bold uppercase">Empire Chat</div>
            <div id="messages" class="flex-1 overflow-y-auto p-4 space-y-2 text-[11px] text-gray-300">
                Welcome to the Empire. Respect is the only currency here.
            </div>
            <div class="p-3 border-t border-white/10 flex gap-2">
                <input id="msg-in" type="text" placeholder="Speak..." class="bg-white/5 w-full rounded px-3 py-2 text-xs outline-none">
                <button onclick="sendMsg()">🚀</button>
            </div>
        </div>

        <div class="glass h-[350px] flex flex-col">
            <div class="p-3 border-b border-white/10 gold text-[10px] font-bold uppercase">Global Elites</div>
            <div id="l-list" class="p-4 space-y-3 overflow-y-auto text-[10px]">
                <div class="flex justify-between"><span>1. Nicole T.</span><span class="gold">💰 1M</span></div>
            </div>
        </div>
    </div>

    <script>
        
    // --- CONFIG ---
    // 1. Swap these placeholders with the keys you found in the Firebase Console
    const firebaseConfig = {
        apiKey: "AIzaSyCxfSyvGxTFkLyB6-THwxl2SKRz91w4nKc",
        authDomain: "nikki-flicks-empire-7fe9f.firebaseapp.com",
        databaseURL: "https://nikki-flicks-empire-7fe9f-default-rtdb.firebaseio.com",
        projectId: "nikki-flicks-empire-7fe9f",
        storageBucket: "nikki-flicks-empire-7fe9f.appspot.com",
        messagingSenderId: "56554589255",
        appId: "1:56554589255:web:8c5b04581775e54d86927d"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const player = videojs('main-player', { fluid: true });
    let currentBalance = 10000;

    // --- EMPIRE LOGIC ---
    function enterEmpire() {
        document.getElementById('gate').style.opacity = '0';
        setTimeout(() => { document.getElementById('gate').style.display = 'none'; }, 1000);
        loadTrending();
        listenForMessages(); // Start the live chat listener
    }

    async function loadTrending() {
        // Fetching trending movies from TMDB
        const r = await fetch(`https://api.themoviedb.org/3/trending/movie/week?api_key=43e8f6e540b344399888c74e152933f7`);
        const d = await r.json();
        renderMovies(d.results);
    }

    function renderMovies(list) {
        const row = document.getElementById('movie-row');
        row.innerHTML = list.map(m => `
            <div class="poster" onclick="playMovie('https://vjs.zencdn.net/v/oceans.mp4', '${m.title.replace(/'/g, "")}')">
                <img src="https://image.tmdb.org/t/p/w500${m.poster_path}" onerror="this.src='https://via.placeholder.com/500x750'">
                <div class="absolute bottom-0 p-4 bg-gradient-to-t from-black w-full text-[9px] font-black uppercase tracking-tighter">${m.title}</div>
            </div>
        `).join('');
    }

    function playMovie(url, title) {
        document.getElementById('player-container').classList.remove('hidden');
        player.src({ type: 'video/mp4', src: url });
        player.play();
        window.scrollTo({ top: 150, behavior: 'smooth' });
        console.log("Playing: " + title);
    }

    // --- CHAT LOGIC (THE CLOUD PART) ---
    function sendMsg() {
        const input = document.getElementById('msg-in');
        const message = input.value.trim();
        if (message === "") return;

        // Push message to Firebase
        db.ref('messages').push({
            text: message,
            timestamp: Date.now(),
            user: "Empire Citizen"
        });
        input.value = "";
    }

    function listenForMessages() {
        const msgDiv = document.getElementById('messages');
        // Listen for new entries in Firebase
        db.ref('messages').limitToLast(15).on('child_added', (snapshot) => {
            const data = snapshot.val();
            const msgElement = `<div><span class="gold font-bold">CITIZEN:</span> ${data.text}</div>`;
            msgDiv.innerHTML += msgElement;
            msgDiv.scrollTop = msgDiv.scrollHeight; // Auto-scroll to latest
        });
    }

    function sitAtTable(game) {
        const id = game === 'SPADES' ? 's-mic' : 'p-mic';
        document.getElementById(id).classList.toggle('hidden');
        document.getElementById(id).classList.toggle('mic-active');
        alert(`Joined ${game} table. Your mic is LIVE.`);
    }

    function upgradeToVIP() {
        if(currentBalance >= 5000) {
            currentBalance -= 5000;
            document.getElementById('balance').innerText = currentBalance;
            document.getElementById('status').innerText = "VIP ELITE";
            document.getElementById('up-btn').style.display = 'none';
            alert("Elite status granted.");
        }
    }
    </script>
</body>
</html>
