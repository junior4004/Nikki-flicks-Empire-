<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIKKI FLICKS EMPIRE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&display=swap');
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; }
        .gold { color: #D4AF37; font-family: 'Cinzel', serif; }
        .border-gold { border: 2px solid #D4AF37; }
        .netflix-row { display: flex; overflow-x: auto; gap: 15px; padding: 10px 20px; scrollbar-width: none; }
        .poster { min-width: 150px; height: 220px; background: #111; border: 1px solid #333; border-radius: 8px; flex-shrink: 0; position: relative; }
        .poster img { width: 100%; height: 100%; border-radius: 8px; object-fit: cover; }
        .casino-card { background: linear-gradient(#1a0a2e, #000); border: 2px solid #D4AF37; padding: 30px; border-radius: 12px; text-align: center; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div id="gate" class="fixed inset-0 bg-black z-[9999] flex flex-col items-center justify-center p-6 text-center">
        <h1 class="gold text-4xl mb-4">NIKKI FLICKS</h1>
        <div class="border-gold p-6 bg-[#0a0a0a] max-w-md">
            <h2 class="gold text-lg mb-2 uppercase">Welcome from Nicole T.</h2>
            <div class="bg-red-950/30 p-4 border border-red-900 mb-6 text-left">
                <p class="text-[11px] leading-relaxed text-gray-300 font-bold uppercase">
                    SPEAK AT YOUR WILL, BUT WATCH YOUR TONGUE.<br><br>
                    THIS IS OUR HOUSE. DISRESPECT IS NOT TOLERATED.<br><br>
                    IF YOU ARE UNDER 18, EXIT NOW.
                </p>
            </div>
            <button onclick="document.getElementById('gate').style.display='none'" class="w-full bg-[#D4AF37] text-black font-black py-4 rounded uppercase">Enter Empire</button>
        </div>
    </div>
    <header class="p-4 border-b border-[#D4AF37] flex justify-between items-center bg-[#050505] sticky top-0 z-50">
        <span class="gold text-xl">NIKKI FLICKS</span>
        <div class="text-[#D4AF37] font-bold border border-[#D4AF37] px-4 py-1 rounded-full text-sm">💰 10,000</div>
    </header>
    <div class="py-4">
        <h2 class="px-5 gold text-sm uppercase tracking-widest mb-2">Empire Theater</h2>
        <div class="netflix-row">
            <div class="poster"><img src="https://image.tmdb.org/t/p/w500/8Gxv2mYmUpeTjU3S3nZpS6YpEPv.jpg"></div>
            <div class="poster"><img src="https://image.tmdb.org/t/p/w500/6oom5QYvA6rEEUbsvMv3Rv70A19.jpg"></div>
            <div class="poster"><img src="https://image.tmdb.org/t/p/w500/v997093p799p8v.jpg"></div>
        </div>
    </div>
    <div class="py-4">
        <h2 class="px-5 gold text-sm uppercase tracking-widest mb-2">The Card Room</h2>
        <div class="grid grid-cols-2 gap-4 px-5">
            <div class="casino-card" onclick="alert('Joining Spades...')">♠️<br>SPADES</div>
            <div class="casino-card" onclick="alert('Joining Poker...')">♥️<br>POKER</div>
        </div>
    </div>
</body>
</html>
