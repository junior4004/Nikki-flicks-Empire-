<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIKKI FLICKS EMPIRE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&display=swap');
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; overflow-x: hidden; }
        .gold { color: #D4AF37; font-family: 'Cinzel', serif; }
        .scroll-row { display: flex; overflow-x: auto; gap: 15px; padding: 10px 20px; scrollbar-width: none; }
        .poster { min-width: 160px; height: 240px; background: #111; border-radius: 8px; flex-shrink: 0; border: 1px solid #333; overflow: hidden; }
        .poster img { width: 100%; height: 100%; object-fit: cover; }
        .casino-card { background: linear-gradient(145deg, #1a1a1a, #000); border: 2px solid #D4AF37; padding: 20px; border-radius: 15px; text-align: center; position: relative; min-width: 140px; }
        .mic-icon { position: absolute; top: 10px; right: 10px; color: #ff3b3b; font-size: 10px; font-weight: bold; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        .adult-row { border-top: 2px solid #4a0000; background: rgba(25, 0, 0, 0.4); padding: 20px 0; }
        .radio-btn { background: #D4AF37; color: #000; padding: 5px 12px; border-radius: 4px; font-weight: bold; font-size: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="gate" class="fixed inset-0 bg-black z-[9999] flex flex-col items-center justify-center p-6 text-center">
        <h1 class="gold text-4xl mb-2">NIKKI FLICKS</h1>
        <div class="border-2 border-[#D4AF37] p-6 bg-[#0a0a0a] max-w-md">
            <h2 class="gold text-lg mb-2">WELCOME FROM NICOLE T.</h2>
            <div class="bg-red-900/20 p-4 border border-red-900 mb-6 text-left">
                <p class="text-[10px] text-gray-300 font-bold uppercase">"Speak at your will, but watch your tongue. Disrespect is not tolerated. 18+"</p>
            </div>
            <button onclick="document.getElementById('gate').style.display='none'" class="w-full bg-[#D4AF37] text-black font-black py-4 rounded uppercase">Enter Empire</button>
        </div>
    </div>

    <header class="p-4 border-b border-[#D4AF37] flex justify-between items-center bg-black sticky top-0 z-50">
        <span class="gold text-xl">NIKKI FLICKS</span>
        <div class="flex items-center gap-3">
            <div id="radio-box" class="flex items-center gap-2">
                <span class="text-[10px] gold font-bold">EMPIRE RADIO</span>
                <button onclick="toggleRadio()" id="r-btn" class="radio-btn">PLAY</button>
            </div>
            <div class="text-[#D4AF37] font-bold text-sm">💰 10,000</div>
        </div>
    </header>

    <audio id="empireAudio" src="https://stream.zeno.fm/f978253v98zuv"></audio>

    <div class="py-6">
        <h2 class="px-5 gold text-xs uppercase tracking-widest mb-4">Imperial Theater</h2>
        <div class="scroll-row">
            <div class="poster"><img src="https://image.tmdb.org/t/p/w500/8Gxv2mYmUpeTjU3S3nZpS6YpEPv.jpg"></div>
            <div class="poster"><img src="https://image.tmdb.org/t/p/w500/6oom5QYvA6rEEUbsvMv3Rv70A19.jpg"></div>
            <div class="poster"><img src="https://image.tmdb.org/t/p/w500/v997093p799p8v.jpg"></div>
        </div>
    </div>

    <div class="py-6 bg-[#050505]">
        <h2 class="px-5 gold text-xs uppercase tracking-widest mb-4">The Imperial Card Room</h2>
        <div class="scroll-row">
            <div class="casino-card" onclick="sitAtTable('SPADES')">
                <span class="mic-icon">🎤 LIVE MIC</span>
                <div class="text-3xl mb-2">♠️</div>
                <div class="font-bold text-xs uppercase">Spades Table</div>
            </div>
            <div class="casino-card" onclick="sitAtTable('POKER')">
                <span class="mic-icon">🎤 LIVE MIC</span>
                <div class="text-3xl mb-2">♥️</div>
                <div class="font-bold text-xs uppercase">Poker Room</div>
            </div>
        </div>
    </div>

    <div class="py-6 adult-row">
        <h2 class="px-5 text-red-600 text-xs uppercase tracking-[.25em] mb-4 font-bold">Empire After Hours (18+)</h2>
        <div class="scroll-row">
            <div class="poster border-red-900"><img src="https://image.tmdb.org/t/p/w500/o73wSBY96su92v5pY0v6as8p0V2.jpg"></div>
            <div class="poster border-red-900"><img src="https://image.tmdb.org/t/p/w500/scv7m7n42yS4fC7e8Pclxid9r7S.jpg"></div>
        </div>
    </div>

    <script>
        function toggleRadio() {
            var audio = document.getElementById("empireAudio");
            var btn = document.getElementById("r-btn");
            if (audio.paused) { audio.play(); btn.innerText = "PAUSE"; btn.style.background = "#ff0000"; btn.style.color = "#fff"; }
            else { audio.pause(); btn.innerText = "PLAY"; btn.style.background = "#D4AF37"; btn.style.color = "#000"; }
        }
        function sitAtTable(game) {
            alert("Sitting at " + game + " table... Mic is now LIVE. Welcome to the Empire.");
        }
    </script>
</body>
</html>
